server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ─────────────────────────────────────────
    # All unmatched paths return index.html so React Router
    # handles client-side navigation without 404s on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Service Worker — never cache ─────────────────────────
    # The SW must always be fetched fresh so update detection
    # works correctly. Matches vercel.json cache headers.
    location = /service-worker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Static assets — immutable long-term cache ─────────────
    # Vite hashes all JS/CSS filenames on build, so a 1-year
    # cache is safe. Matches the vercel.json headers policy.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Images and icons ─────────────────────────────────────
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Audio files — medium cache ────────────────────────────
    location ~* \.mp3$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
